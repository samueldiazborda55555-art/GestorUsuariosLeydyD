<!DOCTYPE html>
<html>

<head>
    <title>Registro</title>
    <meta charset="UTF-8">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Estilo propio -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css')}}">
</head>

<body>


    <!-- MODAL -->
    <div class="modal fade" id="myModale">
        <div class="modal-dialog">
            <div class="modal-content">

                <!-- HEADER -->
                <div class="modal-header">
                    <h4 class="modal-title">Registro de empleados</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <!-- BODY -->
                <div class="modal-body">
                    <form method="POST" action='{{ url_for("guardar_empleado") }}'>

                        <div class="mb-3">
                            <label>Nombre</label>
                            <input type="text" class="form-control" name="txtnombre" placeholder="Ingresar nombre" required>
                        </div>

                        <div class="mb-3">
                            <label>Apellido</label>
                            <input type="text" class="form-control" name="txtapellido" placeholder="Ingresar apellido" required>
                        </div>

                        <div class="mb-3">
                            <label>Documento</label>
                            <input type="number" class="form-control" name="txtdocumento" placeholder="Ingresar documento" required>
                        </div>

                        <div class="mb-3">
                            <label>Cargo</label>
                            <select class="form-select" name="txtcargo" required>
                                <option value="">Seleccione el cargo</option>
                                <option value="gerente">Gerente</option>
                                <option value="administrador">Administrador</option>
                                <option value="docente">Docente</option>
                            </select>
                        </div>
                        </div>

                        <div class="mb-3">
                            <label>Departamento</label>
                            <select class="form-select" name="txtdepartamento" required>
                                <option value="">Seleccione el departamento</option>
                                <option value="1">Recursos humanos</option>
                                <option value="2">Administracion</option>
                                <option value="3">Contabilidad</option>
                                <option value="4">Coordinacion</option>
                                <option value="5">Cafeteria</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label>Horas extra</label>
                            <input type="number" class="form-control" name="txthorasextra" placeholder="Ingresar horas extra" required>
                        </div>

                        <div class="mb-3">
                            <label>Bonificacion</label>
                            <input type="number" class="form-control" name="txtbonificacion" placeholder="Ingresar bonificacion" required>
                        </div>
                        
                        

                        <button type="submit" class="btn btn-success">Registrar</button>
                    </form>
                </div>

                <!-- FOOTER -->
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cerrar</button>
                </div>

            </div>
        </div>
    </div>

</body>

</html>
