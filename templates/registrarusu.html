<!DOCTYPE html>
<html>

<head>
    <title>Registro</title>
    <meta charset="UTF-8">

    <!-- Bootstrap -->
    <link href=" https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src=" https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Estilo propio -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css')}}">
</head>

<body>

    <!--creamos el modal-->
    <div class="modal" id="myModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <!--definir el header-->
                <div class="modal-header">
                    <h4 class="modal-title">Registro de usuarios</h4>
                    <button type="botones" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <!--definir el cuerpo del modal--formulario-->
                <div class="modal-body">
                    <form method="POST" action="">
                        <div class="mb-3 mt-3">
                            <label>Ingresar nombre usuario</label>
                            <input type="text" class="form-control" name="txtusuario" placeholder="Ingresar usuario">
                        </div>
                        <div class="mb-3">
                            <label>Contraseña</label>
                            <input type="password" class="form-control" name="txtcontrasena"
                                placeholder="Ingresar contraseña">
                        </div>
                        <div class="mb-3">
                            <label>Rol:</label>
                            <select class="form-select" name="txtrol" required>
                                <option value="">Seleccione el rol</option>
                                <option value="admin">Administrador</option>
                                <option value="empleado">Empleado</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Ingresar documento:</label>
                            <input type="number" class="form-control" name="txtdocumento"
                                placeholder="Ingresar documento">
                        </div>
                        <button type="submit" class="btn btn-danger" data-bs-dismiss="modal">Registrar</button>
                    </form>
                </div>
                <!--definir  el pie de pagina del formulario-->
                <div class="modal-footer">
                    

                </div>
            </div>

        </div>
    </div>
</body>

</html>
