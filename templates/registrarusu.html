<!DOCTYPE html>
<html>

<head>
    <title>Registro</title>
    <meta charset="UTF-8">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Estilo propio -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css')}}">
</head>

<body>

    <!-- BOTÓN PARA ABRIR EL MODAL -->
    <div class="container mt-3">
    </div>

    <!-- MODAL -->
    <div class="modal fade" id="myModal">
        <div class="modal-dialog">
            <div class="modal-content">

                <!-- HEADER -->
                <div class="modal-header">
                    <h4 class="modal-title">Registro de usuarios</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <!-- BODY -->
                <div class="modal-body">
                    <form method="POST" action="/guardar_usuario">

                        <div class="mb-3">
                            <label>Usuario</label>
                            <input type="text" class="form-control" name="txtusuario" placeholder="Ingresar usuario" required>
                        </div>

                        <div class="mb-3">
                            <label>Contraseña</label>
                            <input type="password" class="form-control" name="txtcontrasena" placeholder="Ingresar contraseña" required>
                        </div>

                        <div class="mb-3">
                            <label>Rol:</label>
                            <select class="form-select" name="txtrol" required>
                                <option value="">Seleccione el rol</option>
                                <option value="administrador">Administrador</option>
                                <option value="empleado">Empleado</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label>Documento:</label>
                            <input type="number" class="form-control" name="txtdocumento" placeholder="Ingresar documento" required>
                        </div>

                        <button type="submit" class="btn btn-success">Registrar</button>
                    </form>
                </div>

                <!-- FOOTER -->
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cerrar</button>
                </div>

            </div>
        </div>
    </div>

</body>

</html>
