<!DOCTYPE html>
<html>

<head>
    <title>Registro empleados</title>
    <meta charset="UTF-8">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Estilo propio -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css')}}">
</head>

<body class="container mt-5">
    <h2>EDITAR EMPLEADO</h2>
<form method="POST" action="{{ url_for('actualizarem')}}">
        <input type="hidden" name="id" value="{{emple[0]}}">
        <div class="mb-3">
            <label>Nombre:</label>
            <input type="text" name="txtnombre" class="form-control" value="{{emple[2]}}">
        </div>
        <div class="mb-3">
            <label>Apellido:</label>
            <input type="text" name="txtapellido" class="form-control" value="{{emple[3]}}">
        </div>
        <div class="mb-3">
            <label>Cargo:</label>
            <input type="text" name="txtcargo" class="form-control" value="{{emple[4]}}">
        </div>
        <div class="mb-3">
            <label>Departamento</label>
            <select class="form-select" name="txtdepartamento" value="{{emple[11]}}" required>
                <option value="">Seleccione el departamento</option>
                <option value="1">Recursos humanos</option>
                <option value="2">Administracion</option>
                <option value="3">Contabilidad</option>
                <option value="4">Coordinacion</option>
                <option value="5">Cafeteria</option>
            </select>
        </div>
        <button class="btn-primary">ACTUALIZAR</button>
        <a href="{{url_for('panel_empleado')}}" class="btn btn-danger">CANCELAR</a>


    </form>
</body>

</html>
